<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Graph — Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface-2: #1a1e28;
    --surface-3: #222838;
    --border: #2a3040;
    --text: #c8cdd8;
    --text-dim: #6b7280;
    --text-bright: #e8ecf4;
    --accent: #5b8af0;
    --accent-dim: rgba(91, 138, 240, 0.15);

    /* Node/edge colors are now generated in JS — see TYPE_COLORS, EDGE_STYLES */
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top bar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
  }

  /* ── Filter bar (below top bar) ── */
  #filterbar {
    position: fixed;
    top: 52px; left: 0; right: 0;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    z-index: 99;
  }

  #filterbar .filter-select {
    flex: 0 1 160px;
    min-width: 0;
  }

  #filterbar .filter-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #filterbar .filter-group {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  #filterbar-clear {
    margin-left: auto;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #filterbar-clear.visible { opacity: 1; }

  #active-filter-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #topbar .logo {
    font-weight: 500;
    font-size: 14px;
    color: var(--text-bright);
    letter-spacing: 0.03em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #topbar .logo .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  #search-wrap {
    position: relative;
    flex: 0 1 320px;
  }

  #search {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px 7px 32px;
    color: var(--text-bright);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }

  #search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  #search-results {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    z-index: 200;
  }

  #search-results.visible { display: block; }

  .search-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .search-item:hover { background: var(--surface-3); }

  .search-item .type-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .search-item .name { color: var(--text-bright); }
  .search-item .meta { color: var(--text-dim); font-size: 11px; margin-left: auto; }

  #fit-btn {
    margin-left: auto;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 14px;
    padding: 4px 8px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  #fit-btn:hover { color: var(--text-bright); border-color: var(--accent); }

  #stats {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    white-space: nowrap;
  }

  /* ── Filter panel (left) ── */
  #filters {
    position: fixed;
    top: 96px;
    left: 0;
    width: 220px;
    bottom: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
    z-index: 90;
    transform: translateX(0);
    transition: transform 0.25s ease;
  }

  #filters.collapsed { transform: translateX(-220px); }

  #filter-toggle {
    position: fixed;
    top: 108px;
    left: 220px;
    width: 24px;
    height: 24px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 4px 4px 0;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    z-index: 91;
    transition: left 0.25s ease;
  }

  #filter-toggle.shifted { left: 0; }

  .filter-section {
    padding: 0 16px;
    margin-bottom: 20px;
  }

  .filter-select {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    color: var(--text-bright);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    padding-right: 24px;
  }

  .filter-select:focus { border-color: var(--accent); }

  .filter-select option {
    background: var(--surface-2);
    color: var(--text);
  }

  .filter-clear {
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    margin-left: auto;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .filter-clear.visible { opacity: 1; }

  .filter-title-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .filter-title-row .filter-title {
    margin-bottom: 0;
  }

  .filter-title {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    user-select: none;
    transition: opacity 0.2s;
  }

  .filter-item:hover { color: var(--text-bright); }
  .filter-item.disabled { opacity: 0.35; }

  .filter-item .swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .filter-item .count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .filter-item .solo-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: 1px solid transparent;
    border-radius: 3px;
    padding: 0 4px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    line-height: 16px;
    flex-shrink: 0;
  }

  .filter-item:hover .solo-btn { opacity: 0.6; }
  .filter-item .solo-btn:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }
  .filter-item .solo-btn.active {
    opacity: 1;
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Detail panel (right) ── */
  #detail {
    position: fixed;
    top: 96px;
    right: 0;
    width: 340px;
    bottom: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 0;
    z-index: 90;
    transform: translateX(340px);
    transition: transform 0.3s ease;
  }

  #detail.open { transform: translateX(0); }

  #detail-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }
  #detail-close:hover { color: var(--text-bright); }

  #detail-back {
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: default;
    opacity: 0.3;
    pointer-events: none;
    transition: color 0.15s, opacity 0.15s;
    user-select: none;
  }
  #detail-back.enabled { opacity: 1; pointer-events: auto; cursor: pointer; }
  #detail-back.enabled:hover { color: var(--text-bright); }
  #detail-back .back-arrow { font-size: 14px; }

  .detail-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .detail-header .node-type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 8px;
  }

  .detail-header .node-name {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-bright);
    line-height: 1.3;
  }

  .detail-header .node-sub {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .detail-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .detail-prop {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
  }

  .detail-prop .key { color: var(--text-dim); }
  .detail-prop .val { color: var(--text); text-align: right; max-width: 60%; }
  .detail-prop .val-link {
    cursor: pointer;
    color: var(--accent);
    transition: color 0.15s;
  }
  .detail-prop .val-link:hover { color: var(--text-bright); text-decoration: underline; }
  .detail-prop .val-filter {
    cursor: pointer;
    color: var(--accent);
    transition: color 0.15s;
  }
  .detail-prop .val-filter:hover { color: var(--text-bright); text-decoration: underline; }

  .detail-edge {
    padding: 6px 0;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .detail-edge:hover { color: var(--text-bright); }

  .detail-edge .edge-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--surface-3);
    color: var(--text-dim);
    white-space: nowrap;
  }

  .detail-edge .edge-target { color: var(--text); }
  .detail-edge .edge-dir { color: var(--text-dim); font-size: 10px; }

  .detail-bio {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    font-style: italic;
    opacity: 0.85;
  }

  /* ── Canvas area ── */
  #graph-container {
    position: fixed;
    top: 96px;
    left: 220px;
    right: 0;
    bottom: 0;
    transition: left 0.25s ease;
  }

  #graph-container.expanded { left: 0; }

  svg { width: 100%; height: 100%; display: block; }

  /* ── Loading ── */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.5s;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  #loading .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  #loading .label {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-bright);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 250px;
  }

  #tooltip.visible { opacity: 1; }
  #tooltip .tt-type { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  #tooltip .tt-name { margin-top: 1px; }

  /* ── Depth control ── */
  .depth-control {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
  }

  .depth-control .depth-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }

  .depth-btn {
    width: 28px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .depth-btn:hover { border-color: var(--accent); color: var(--text); }
  .depth-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Edge groups (collapsible connections) ── */
  .edge-group {
    margin-bottom: 4px;
  }

  .edge-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    user-select: none;
    transition: color 0.15s;
  }

  .edge-group-header:hover { color: var(--text-bright); }

  .edge-group-header .group-arrow {
    font-size: 14px;
    color: var(--text-dim);
    transition: transform 0.2s;
    width: 16px;
    text-align: center;
  }

  .edge-group-header .group-arrow.collapsed { transform: rotate(-90deg); }

  .edge-group-header .group-swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .edge-group-header .group-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .edge-group-header .group-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .edge-group-items {
    overflow: hidden;
    transition: max-height 0.25s ease;
    max-height: 500px;
    padding-left: 18px;
  }

  .edge-group-items.collapsed {
    max-height: 0;
  }

  /* ── Edge tooltip extras ── */
  #tooltip .tt-edge-endpoints {
    font-size: 11px;
    color: var(--text);
    margin-top: 2px;
  }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface-3); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="label">Loading graph…</div>
</div>

<div id="tooltip">
  <div class="tt-type"></div>
  <div class="tt-name"></div>
</div>

<div id="topbar">
  <div class="logo"><div class="dot"></div> Employee Graph Viewer</div>
  <div id="search-wrap">
    <input type="text" id="search" placeholder="Search nodes…" autocomplete="off">
    <div id="search-results"></div>
  </div>
  <button id="fit-btn" title="Fit graph to view (F)">⊞</button>
  <div id="stats"></div>
</div>

<div id="filterbar">
  <div class="filter-group"><span class="filter-label">Team</span><select class="filter-select" id="fb-team"><option value="">All</option></select></div>
  <div class="filter-group"><span class="filter-label">Dept</span><select class="filter-select" id="fb-department"><option value="">All</option></select></div>
  <div class="filter-group"><span class="filter-label">Division</span><select class="filter-select" id="fb-division"><option value="">All</option></select></div>
  <div class="filter-group"><span class="filter-label">Title</span><select class="filter-select" id="fb-title"><option value="">All</option></select></div>
  <div class="filter-group"><span class="filter-label">Location</span><select class="filter-select" id="fb-location"><option value="">All</option></select></div>
  <div class="filter-group"><span class="filter-label">Status</span><select class="filter-select" id="fb-status"><option value="">All</option></select></div>
  <span id="active-filter-count"></span>
  <span id="filterbar-clear">Clear all</span>
</div>

<button id="filter-toggle" title="Toggle filters">◂</button>

<div id="filters"></div>

<div id="graph-container">
  <svg id="graph-svg"></svg>
</div>

<div id="detail">
  <div id="detail-back" title="Go back"><span class="back-arrow">←</span> Back</div>
  <button id="detail-close">×</button>
  <div id="detail-content"></div>
</div>

<script>
const TYPE_COLORS = {
  person: '#5b8af0', candidate: '#a78bfa', team: '#34d399', skill: '#f59e0b',
  project: '#f472b6', certification: '#fb923c', position: '#6ee7b7',
  equipment: '#94a3b8', document: '#a1a1aa', benefits: '#2dd4bf',
  comp: '#4ade80', location: '#38bdf8', jurisdiction: '#818cf8',
  policy: '#c084fc', life_event: '#fb7185', review: '#e879f9',
  recognition: '#fbbf24', interview: '#a78bfa'
};

const NODE_RADIUS = {
  person: 6, candidate: 5, team: 8, skill: 4, project: 5,
  certification: 3.5, position: 3, equipment: 3, document: 3,
  benefits: 3.5, comp: 3, location: 5, jurisdiction: 4,
  policy: 3.5, life_event: 4, review: 3.5, recognition: 3.5, interview: 3
};

const EDGE_STYLES = {
  reports_to:        { color: '#3b5998', dash: null, width: 1.2 },
  member_of:         { color: '#2d8a5e', dash: null, width: 0.8 },
  team_parent:       { color: '#2d8a5e', dash: '4,3', width: 0.8 },
  collaborates_with: { color: '#d97706', dash: '3,3', width: 1 },
  mentors:           { color: '#8b5cf6', dash: '2,3', width: 1.2 },
  works_on:          { color: '#ec4899', dash: null, width: 0.7 },
  has_skill:         { color: '#d97706', dash: null, width: 0.5 },
  has_certification: { color: '#fb923c', dash: null, width: 0.5 },
  recognized:        { color: '#f59e0b', dash: '4,2', width: 1 },
  located_at:        { color: '#38bdf8', dash: null, width: 0.5 },
  has_benefits:      { color: '#2dd4bf', dash: null, width: 0.4 },
  has_comp:          { color: '#4ade80', dash: null, width: 0.4 },
  subject_to:        { color: '#818cf8', dash: null, width: 0.4 },
  governed_by:       { color: '#c084fc', dash: null, width: 0.4 },
  holds_position:    { color: '#6ee7b7', dash: null, width: 0.5 },
  candidate_for:     { color: '#a78bfa', dash: '3,2', width: 0.8 },
  interviewed_by:    { color: '#a78bfa', dash: '2,2', width: 0.7 },
  referred_by:       { color: '#a78bfa', dash: '4,3', width: 0.8 },
  has_interview:     { color: '#a78bfa', dash: null, width: 0.5 },
  life_event:        { color: '#fb7185', dash: null, width: 0.8 },
  signed:            { color: '#a1a1aa', dash: null, width: 0.4 },
  assigned_equipment:{ color: '#94a3b8', dash: null, width: 0.4 },
  has_review:        { color: '#e879f9', dash: null, width: 0.5 },
  buddy_of:          { color: '#34d399', dash: '3,3', width: 1 },
  converted_from:    { color: '#a78bfa', dash: '5,3', width: 0.8 },
  onboarding_step:   { color: '#5b8af0', dash: '2,2', width: 0.6 }
};

function getNodeLabel(node) {
  const p = node.properties;
  return p.name || p.title || p.label || p.displayName || p.planName || p.planType
    || p.type || p.eventType || p.message || p.state || node.id;
}

function getNodeSub(node) {
  const p = node.properties;
  // Generic fallback chain — first truthy value wins
  const candidates = [p.role, p.department, p.status, p.category, p.type, p.description];
  for (const c of candidates) { if (c) return c; }
  return '';
}

// ── Main ──
(async function() {
  const [nodesData, edgesData] = await Promise.all([
    fetch('data/nodes.json').then(r => r.json()),
    fetch('data/edges.json').then(r => r.json())
  ]);

  const nodes = nodesData.nodes || nodesData;
  const edges = edgesData.edges || edgesData;

  // Index
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  // Filter out edges with missing nodes
  const validEdges = edges.filter(e => nodeMap.has(e.source) && nodeMap.has(e.target));

  // Count by type
  const nodeTypeCounts = {};
  nodes.forEach(n => { nodeTypeCounts[n.type] = (nodeTypeCounts[n.type] || 0) + 1; });
  const edgeTypeCounts = {};
  validEdges.forEach(e => { edgeTypeCounts[e.type] = (edgeTypeCounts[e.type] || 0) + 1; });

  // ── Auto-generate effective styles ──
  // Golden-angle hue rotation for deterministic, evenly-spaced colors
  function goldenColor(index, saturation = 70, lightness = 65) {
    const hue = (index * 137.508) % 360;
    return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
  }

  // Build effectiveNodeColors: overrides first, then auto-generate
  const effectiveNodeColors = {};
  const sortedNodeTypes = Object.keys(nodeTypeCounts).sort();
  sortedNodeTypes.forEach((type, i) => {
    effectiveNodeColors[type] = TYPE_COLORS[type] || goldenColor(i);
  });

  // Build effectiveNodeRadius: overrides first, default 4, bump high-count types
  const effectiveNodeRadius = {};
  const maxNodeCount = Math.max(...Object.values(nodeTypeCounts));
  sortedNodeTypes.forEach(type => {
    if (NODE_RADIUS[type] !== undefined) {
      effectiveNodeRadius[type] = NODE_RADIUS[type];
    } else {
      const freq = nodeTypeCounts[type] / maxNodeCount;
      effectiveNodeRadius[type] = 4 + freq * 3; // 4-7 range
    }
  });

  // Build effectiveEdgeStyles: overrides first, then auto-generate
  const effectiveEdgeStyles = {};
  const sortedEdgeTypes = Object.keys(edgeTypeCounts).sort();
  const maxEdgeCount = Math.max(...Object.values(edgeTypeCounts));
  const defaultEdgeStyle = { color: '#334155', dash: null, width: 0.5 };
  sortedEdgeTypes.forEach((type, i) => {
    if (EDGE_STYLES[type]) {
      effectiveEdgeStyles[type] = EDGE_STYLES[type];
    } else {
      const freq = edgeTypeCounts[type] / maxEdgeCount;
      effectiveEdgeStyles[type] = {
        color: goldenColor(i, 40, 50), // desaturated palette
        dash: null,
        width: 0.5 + freq * 0.5 // 0.5-1.0 range
      };
    }
  });

  function getEdgeStyle(type) {
    return effectiveEdgeStyles[type] || defaultEdgeStyle;
  }

  // Stats
  document.getElementById('stats').textContent = `${nodes.length} nodes · ${validEdges.length} edges`;

  // ── Filters ──
  const filtersEl = document.getElementById('filters');
  const activeNodeTypes = new Set(Object.keys(nodeTypeCounts));
  const activeEdgeTypes = new Set(Object.keys(edgeTypeCounts));
  const allNodeTypes = Object.keys(nodeTypeCounts);
  const allEdgeTypes = Object.keys(edgeTypeCounts);
  let soloedNodeType = null;
  let soloedEdgeType = null;

  function syncFilterUI() {
    filtersEl.querySelectorAll('.filter-item').forEach(el => {
      const kind = el.dataset.kind;
      const type = el.dataset.type;
      const set = kind === 'node' ? activeNodeTypes : activeEdgeTypes;
      const soloed = kind === 'node' ? soloedNodeType : soloedEdgeType;
      el.classList.toggle('disabled', !set.has(type));
      const soloBtn = el.querySelector('.solo-btn');
      if (soloBtn) soloBtn.classList.toggle('active', soloed === type);
    });
  }

  // ── Filterbar data (person-level filters + team) ──
  const teamNodes = nodes.filter(n => n.type === 'team');
  const memberOfEdges = validEdges.filter(e => e.type === 'member_of');
  const teamInfo = new Map();
  teamNodes.forEach(t => {
    teamInfo.set(t.id, {
      name: t.properties?.name || t.id,
      teamType: t.properties?.teamType || 'department',
      members: new Set()
    });
  });
  memberOfEdges.forEach(e => {
    const src = e.source.id || e.source;
    const tgt = e.target.id || e.target;
    if (teamInfo.has(tgt)) teamInfo.get(tgt).members.add(src);
  });

  // Collect unique values for person-level filters
  const personNodes = nodes.filter(n => n.type === 'person');
  const filterDimensions = {
    department: new Map(),
    division: new Map(),
    title: new Map(),
    location: new Map(),
    status: new Map()
  };
  personNodes.forEach(p => {
    const props = p.properties || {};
    const add = (dim, val) => { if (val) filterDimensions[dim].set(val, (filterDimensions[dim].get(val) || 0) + 1); };
    add('department', props.department);
    add('division', props.division);
    add('title', props.role);
    add('location', props.location);
    add('status', props.status);
  });

  // Active filterbar state
  const activeFilters = { team: null, department: null, division: null, title: null, location: null, status: null };

  function getFilterbarMatchedPersons() {
    const hasAny = Object.values(activeFilters).some(v => v);
    if (!hasAny) return null;

    // Start with all person IDs
    let matched = new Set(personNodes.map(p => p.id));

    // Team filter
    if (activeFilters.team) {
      const info = teamInfo.get(activeFilters.team);
      if (info) matched = new Set([...matched].filter(id => info.members.has(id)));
    }

    // Property filters
    const propMap = { department: 'department', division: 'division', title: 'role', location: 'location', status: 'status' };
    for (const [filterKey, propKey] of Object.entries(propMap)) {
      if (activeFilters[filterKey]) {
        matched = new Set([...matched].filter(id => {
          const n = nodeMap.get(id);
          return n && (n.properties || {})[propKey] === activeFilters[filterKey];
        }));
      }
    }

    // Also include the team node itself if team is filtered
    if (activeFilters.team) matched.add(activeFilters.team);

    return matched;
  }

  function populateFilterbar() {
    // Team dropdown with optgroups
    const teamSelect = document.getElementById('fb-team');
    const typeGroups = { department: [], scrum: [], initiative: [], working_group: [] };
    teamInfo.forEach((info, id) => {
      const group = typeGroups[info.teamType] || typeGroups['department'];
      group.push({ id, name: info.name, count: info.members.size });
    });
    const groupLabels = { department: 'Department', scrum: 'Scrum', initiative: 'Initiative', working_group: 'Working Group' };
    for (const [groupKey, label] of Object.entries(groupLabels)) {
      const teams = typeGroups[groupKey];
      if (!teams.length) continue;
      const optgroup = document.createElement('optgroup');
      optgroup.label = label;
      teams.sort((a, b) => a.name.localeCompare(b.name));
      teams.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = `${t.name} (${t.count})`;
        optgroup.appendChild(opt);
      });
      teamSelect.appendChild(optgroup);
    }

    // Other dropdowns
    const dimSelects = { department: 'fb-department', division: 'fb-division', title: 'fb-title', location: 'fb-location', status: 'fb-status' };
    for (const [dim, selectId] of Object.entries(dimSelects)) {
      const sel = document.getElementById(selectId);
      const entries = [...filterDimensions[dim].entries()].sort((a, b) => a[0].localeCompare(b[0]));
      entries.forEach(([val, count]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = `${val} (${count})`;
        sel.appendChild(opt);
      });
    }

    // Event listeners
    const allSelects = { team: 'fb-team', department: 'fb-department', division: 'fb-division', title: 'fb-title', location: 'fb-location', status: 'fb-status' };
    for (const [key, selectId] of Object.entries(allSelects)) {
      document.getElementById(selectId).addEventListener('change', (e) => {
        activeFilters[key] = e.target.value || null;
        updateFilterbarUI();
        updateVisibility();
      });
    }

    document.getElementById('filterbar-clear').addEventListener('click', () => {
      for (const key of Object.keys(activeFilters)) activeFilters[key] = null;
      for (const selectId of Object.values(allSelects)) document.getElementById(selectId).value = '';
      updateFilterbarUI();
      updateVisibility();
    });
  }

  function updateFilterbarUI() {
    const count = Object.values(activeFilters).filter(v => v).length;
    const countEl = document.getElementById('active-filter-count');
    const clearEl = document.getElementById('filterbar-clear');
    countEl.textContent = count ? `${count} filter${count > 1 ? 's' : ''}` : '';
    clearEl.classList.toggle('visible', count > 0);
  }

  populateFilterbar();

  function buildFilters() {
    // ── Node type filters ──
    let html = '<div class="filter-section"><div class="filter-title">Node Types</div>';
    for (const [type, count] of Object.entries(nodeTypeCounts).sort((a,b) => b[1] - a[1])) {
      const color = effectiveNodeColors[type] || '#666';
      const active = activeNodeTypes.has(type);
      html += `<div class="filter-item ${active ? '' : 'disabled'}" data-kind="node" data-type="${type}">
        <span class="swatch" style="background:${color}"></span>
        <span>${type.replace(/_/g, ' ')}</span>
        <span class="count">${count}</span>
        <button class="solo-btn" data-kind="node" data-type="${type}" title="Solo — show only this type">S</button>
      </div>`;
    }
    html += '</div><div class="filter-section"><div class="filter-title">Edge Types</div>';
    for (const [type, count] of Object.entries(edgeTypeCounts).sort((a,b) => b[1] - a[1])) {
      const style = getEdgeStyle(type);
      const active = activeEdgeTypes.has(type);
      html += `<div class="filter-item ${active ? '' : 'disabled'}" data-kind="edge" data-type="${type}">
        <span class="swatch" style="background:${style.color}"></span>
        <span>${type.replace(/_/g, ' ')}</span>
        <span class="count">${count}</span>
        <button class="solo-btn" data-kind="edge" data-type="${type}" title="Solo — show only this type">S</button>
      </div>`;
    }
    html += '</div>';
    filtersEl.innerHTML = html;


    // Toggle click (on the row, excluding the solo button)
    filtersEl.querySelectorAll('.filter-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.solo-btn')) return; // handled separately
        const kind = el.dataset.kind;
        const type = el.dataset.type;
        const set = kind === 'node' ? activeNodeTypes : activeEdgeTypes;
        // If currently soloed, clear solo first
        if (kind === 'node' && soloedNodeType) { soloedNodeType = null; }
        if (kind === 'edge' && soloedEdgeType) { soloedEdgeType = null; }
        if (set.has(type)) { set.delete(type); }
        else { set.add(type); }
        syncFilterUI();
        updateVisibility();
      });
    });

    // Solo click
    filtersEl.querySelectorAll('.solo-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const kind = btn.dataset.kind;
        const type = btn.dataset.type;
        const set = kind === 'node' ? activeNodeTypes : activeEdgeTypes;
        const allTypes = kind === 'node' ? allNodeTypes : allEdgeTypes;
        const currentSolo = kind === 'node' ? soloedNodeType : soloedEdgeType;

        if (currentSolo === type) {
          // Un-solo: restore all
          allTypes.forEach(t => set.add(t));
          if (kind === 'node') soloedNodeType = null;
          else soloedEdgeType = null;
        } else {
          // Solo: show only this type
          set.clear();
          set.add(type);
          if (kind === 'node') soloedNodeType = type;
          else soloedEdgeType = type;
        }
        syncFilterUI();
        updateVisibility();
      });
    });
  }

  buildFilters();

  // ── Filter toggle ──
  const filterToggle = document.getElementById('filter-toggle');
  const graphContainer = document.getElementById('graph-container');
  let filtersVisible = true;
  filterToggle.addEventListener('click', () => {
    filtersVisible = !filtersVisible;
    filtersEl.classList.toggle('collapsed', !filtersVisible);
    filterToggle.classList.toggle('shifted', !filtersVisible);
    graphContainer.classList.toggle('expanded', !filtersVisible);
    filterToggle.textContent = filtersVisible ? '◂' : '▸';
  });

  // ── D3 Setup ──
  const svg = d3.select('#graph-svg');
  const container = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on('zoom', (event) => {
      container.attr('transform', event.transform);
      updateLabelVisibility(event.transform.k);
    });
  svg.call(zoom);

  // ── Zoom-dependent label visibility ──
  // At overview zoom, only show labels on high-importance nodes.
  // As you zoom in, progressively reveal more.
  function updateLabelVisibility(zoomScale) {
    nodeElements.select('text').attr('display', d => {
      const r = effectiveNodeRadius[d.type] || 4;
      const screenR = r * zoomScale;
      // Always show if zoomed in enough that the node is prominent
      if (screenR >= 8) return null;
      // At medium zoom, show nodes with radius >= 5 (person, team, location, etc.)
      if (screenR >= 4 && r >= 5) return null;
      // At overview, hide small node labels
      return 'none';
    });
  }

  // ── BFS neighborhood ──
  function getNeighborhood(nodeId, depth) {
    const hops = new Map(); // nodeId -> hop distance
    const edgeIds = new Set();
    hops.set(nodeId, 0);
    let frontier = [nodeId];

    for (let hop = 1; hop <= depth; hop++) {
      const nextFrontier = [];
      for (const nid of frontier) {
        for (const e of validEdges) {
          const sid = e.source.id || e.source;
          const tid = e.target.id || e.target;
          if (sid === nid && !hops.has(tid)) {
            hops.set(tid, hop);
            nextFrontier.push(tid);
            edgeIds.add(e);
          } else if (tid === nid && !hops.has(sid)) {
            hops.set(sid, hop);
            nextFrontier.push(sid);
            edgeIds.add(e);
          }
          // Also include edges between already-found nodes
          if (hops.has(sid) && hops.has(tid)) {
            edgeIds.add(e);
          }
        }
      }
      frontier = nextFrontier;
    }
    return { hops, edgeIds };
  }

  // ── Build adjacency for edge lookup ──
  const edgeIndex = new Map(); // nodeId -> [edges]
  validEdges.forEach(e => {
    const sid = e.source.id || e.source;
    const tid = e.target.id || e.target;
    if (!edgeIndex.has(sid)) edgeIndex.set(sid, []);
    if (!edgeIndex.has(tid)) edgeIndex.set(tid, []);
    edgeIndex.get(sid).push(e);
    edgeIndex.get(tid).push(e);
  });

  // ── Team clustering: build team map ──
  const teamMap = new Map(); // nodeId -> teamId
  validEdges.forEach(e => {
    if (e.type === 'member_of') {
      const personId = e.source.id || e.source;
      const teamId = e.target.id || e.target;
      teamMap.set(personId, teamId);
    }
  });

  // ── Data-driven force heuristics ──
  // Compute node degree for charge scaling
  const nodeDegree = {};
  validEdges.forEach(e => {
    const sid = e.source.id || e.source;
    const tid = e.target.id || e.target;
    nodeDegree[sid] = (nodeDegree[sid] || 0) + 1;
    nodeDegree[tid] = (nodeDegree[tid] || 0) + 1;
  });

  // Edge frequency for link distance/strength
  const edgeFreqMax = Math.max(...Object.values(edgeTypeCounts), 1);

  // ── Simulation ──
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(validEdges).id(d => d.id).distance(d => {
      const freq = (edgeTypeCounts[d.type] || 1) / edgeFreqMax;
      return 40 + (1 - freq) * 40; // common=40, rare=80
    }).strength(d => {
      const freq = (edgeTypeCounts[d.type] || 1) / edgeFreqMax;
      return 0.1 + freq * 0.4; // common=0.5, rare=0.1
    }))
    .force('charge', d3.forceManyBody().strength(d => {
      const deg = nodeDegree[d.id] || 0;
      return -Math.min(30 + deg * 5, 150);
    }).distanceMax(300))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => (effectiveNodeRadius[d.type] || 4) + 2))
    .alphaDecay(0.02);

  // ── Tooltip (declared early for edge hover) ──
  const tooltip = document.getElementById('tooltip');
  const ttType = tooltip.querySelector('.tt-type');
  const ttName = tooltip.querySelector('.tt-name');

  // ── Draw edges ──
  const linkG = container.append('g').attr('class', 'links');
  const linkElements = linkG.selectAll('line')
    .data(validEdges)
    .join('line')
    .attr('stroke', d => getEdgeStyle(d.type).color)
    .attr('stroke-width', d => getEdgeStyle(d.type).width)
    .attr('stroke-dasharray', d => getEdgeStyle(d.type).dash)
    .attr('stroke-opacity', 0.4);

  // ── Edge hover hit targets (invisible wider lines) ──
  const linkHitG = container.append('g').attr('class', 'link-hits');
  const linkHitElements = linkHitG.selectAll('line')
    .data(validEdges)
    .join('line')
    .attr('stroke', 'transparent')
    .attr('stroke-width', 12)
    .attr('pointer-events', 'stroke')
    .attr('cursor', 'pointer');

  linkHitElements
    .on('mouseenter', (event, d) => {
      const srcNode = typeof d.source === 'object' ? d.source : nodeMap.get(d.source);
      const tgtNode = typeof d.target === 'object' ? d.target : nodeMap.get(d.target);
      ttType.textContent = d.type.replace(/_/g, ' ');
      ttName.innerHTML = `<div class="tt-edge-endpoints">${getNodeLabel(srcNode)} → ${getNodeLabel(tgtNode)}</div>`;
      tooltip.classList.add('visible');
      // Highlight the actual edge
      linkElements.filter(e => e === d).attr('stroke-opacity', 1).attr('stroke-width', e => getEdgeStyle(e.type).width * 2.5);
    })
    .on('mousemove', (event) => {
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
    })
    .on('mouseleave', (event, d) => {
      tooltip.classList.remove('visible');
      // Restore edge style based on current selection state
      if (selectedNode) {
        const neighborhood = getNeighborhood(selectedNode.id, currentDepth);
        const inNeighborhood = neighborhood.edgeIds.has(d);
        const sid = d.source.id || d.source;
        const tid = d.target.id || d.target;
        const maxHop = Math.max(neighborhood.hops.get(sid) || 99, neighborhood.hops.get(tid) || 99);
        let opacity = 0.03;
        if (inNeighborhood) {
          opacity = maxHop <= 1 ? 0.8 : maxHop === 2 ? 0.45 : 0.25;
        }
        linkElements.filter(e => e === d)
          .attr('stroke-opacity', opacity)
          .attr('stroke-width', e => getEdgeStyle(e.type).width);
      } else {
        linkElements.filter(e => e === d)
          .attr('stroke-opacity', 0.4)
          .attr('stroke-width', e => getEdgeStyle(e.type).width);
      }
    });

  // ── Draw nodes (must be last so they're on top for pointer events) ──
  const nodeG = container.append('g').attr('class', 'nodes');
  const nodeElements = nodeG.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.1).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  // Invisible hit target — ensures small nodes are clickable over edge hit lines
  nodeElements.append('circle')
    .attr('r', d => Math.max((effectiveNodeRadius[d.type] || 4) + 4, 10))
    .attr('fill', 'transparent')
    .attr('pointer-events', 'all');

  nodeElements.append('circle')
    .attr('r', d => effectiveNodeRadius[d.type] || 4)
    .attr('fill', d => effectiveNodeColors[d.type] || '#666')
    .attr('stroke', 'none')
    .attr('opacity', 0.85)
    .attr('pointer-events', 'none');

  // Labels on all node types — font size derived from radius
  nodeElements
    .append('text')
    .text(d => getNodeLabel(d))
    .attr('x', d => (effectiveNodeRadius[d.type] || 4) + 4)
    .attr('y', 3)
    .attr('font-size', d => Math.max(6, (effectiveNodeRadius[d.type] || 4) + 2))
    .attr('font-family', 'DM Sans, sans-serif')
    .attr('fill', d => effectiveNodeColors[d.type] || '#8899b0')
    .attr('font-weight', d => (effectiveNodeRadius[d.type] || 4) >= 6 ? 500 : 300)
    .attr('pointer-events', 'none')
    .attr('opacity', 0.7);

  // ── Node tooltip + click handlers ──
  nodeElements
    .on('mouseenter', (event, d) => {
      ttType.textContent = d.type.replace(/_/g, ' ');
      ttName.textContent = getNodeLabel(d);
      tooltip.classList.add('visible');
    })
    .on('mousemove', (event) => {
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
    })
    .on('mouseleave', () => {
      tooltip.classList.remove('visible');
    })
    .on('click', (event, d) => {
      event.stopPropagation();
      selectNode(d);
    });

  svg.on('click', () => clearSelection());

  // ── Tick ──
  simulation.on('tick', () => {
    linkElements
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    linkHitElements
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ── Fit after settling ──
  simulation.on('end', fitGraph);
  setTimeout(fitGraph, 3000);

  function fitGraph() {
    const bounds = container.node().getBBox();
    if (!bounds.width) return;
    const svgEl = document.getElementById('graph-svg');
    const w = svgEl.clientWidth;
    const h = svgEl.clientHeight;
    const scale = Math.min(w / (bounds.width + 60), h / (bounds.height + 60), 1.5) * 0.85;
    const tx = w / 2 - (bounds.x + bounds.width / 2) * scale;
    const ty = h / 2 - (bounds.y + bounds.height / 2) * scale;
    svg.transition().duration(800).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  }

  // ── Selection ──
  let selectedNode = null;
  let currentDepth = 1;
  const selectionHistory = []; // stack of {type, id, depth} or {type, key, val}

  function selectNode(d, depth, skipHistory) {
    // Push previous state to history (unless going back or changing depth)
    if (!skipHistory && selectedNode && selectedNode.id !== d.id) {
      selectionHistory.push({ type: 'node', id: selectedNode.id, depth: currentDepth });
    }
    selectedNode = d;
    if (depth !== undefined) currentDepth = depth;

    const neighborhood = getNeighborhood(d.id, currentDepth);
    const { hops, edgeIds } = neighborhood;

    // Selection ring on selected node, clear all others
    nodeElements.selectAll('circle:nth-child(2)')
      .attr('stroke', n => n.id === d.id ? '#fff' : 'none')
      .attr('stroke-width', n => n.id === d.id ? 2 : 0)
      .attr('opacity', n => {
        if (!hops.has(n.id)) return 0.08;
        const hop = hops.get(n.id);
        if (hop === 0) return 1;
        if (hop === 1) return 0.95;
        if (hop === 2) return 0.55;
        return 0.35;
      });
    nodeElements.select('text')
      .attr('opacity', n => {
        if (!hops.has(n.id)) return 0.05;
        const hop = hops.get(n.id);
        if (hop === 0) return 1;
        if (hop === 1) return 0.9;
        if (hop === 2) return 0.5;
        return 0.3;
      });
    linkElements
      .attr('stroke-opacity', e => {
        if (!edgeIds.has(e)) return 0.03;
        // Determine the max hop of connected nodes
        const sid = e.source.id || e.source;
        const tid = e.target.id || e.target;
        const maxHop = Math.max(hops.get(sid) || 0, hops.get(tid) || 0);
        if (maxHop <= 1) return 0.8;
        if (maxHop === 2) return 0.45;
        return 0.25;
      });

    // Direct connections for the detail panel (always 1-hop)
    const connectedEdges = validEdges.filter(e =>
      (e.source.id || e.source) === d.id || (e.target.id || e.target) === d.id
    );
    showDetail(d, connectedEdges);
    updateBackBtn();
  }

  function goBack() {
    if (!selectionHistory.length) return;
    const prev = selectionHistory.pop();
    if (prev.type === 'node') {
      const node = nodes.find(n => n.id === prev.id);
      if (node) selectNode(node, prev.depth, true);
    } else if (prev.type === 'facet') {
      showFacet(prev.key, prev.val, true);
    }
  }

  function clearSelection() {
    selectedNode = null;
    currentDepth = 1;
    selectionHistory.length = 0;
    updateBackBtn();
    nodeElements.selectAll('circle:nth-child(2)').attr('opacity', 0.85).attr('stroke', 'none').attr('stroke-width', 0);
    nodeElements.select('text').attr('opacity', 0.7);
    linkElements.attr('stroke-opacity', 0.4);
    document.getElementById('detail').classList.remove('open');
    // Re-apply zoom-based label visibility
    const currentZoom = d3.zoomTransform(svg.node()).k;
    updateLabelVisibility(currentZoom);
  }

  // ── Facet filter — highlight all nodes sharing a property value ──
  function showFacet(key, val, skipHistory) {
    // Push previous state to history
    if (!skipHistory && selectedNode) {
      selectionHistory.push({ type: 'node', id: selectedNode.id, depth: currentDepth });
    }
    selectedNode = null;
    const matching = nodes.filter(n => String(n.properties[key]) === val);
    const matchIds = new Set(matching.map(n => n.id));

    // Highlight matching nodes, dim everything else
    nodeElements.selectAll('circle:nth-child(2)')
      .attr('stroke', n => matchIds.has(n.id) ? '#fff' : 'none')
      .attr('stroke-width', n => matchIds.has(n.id) ? 1.5 : 0)
      .attr('opacity', n => matchIds.has(n.id) ? 1 : 0.08);
    nodeElements.select('text')
      .attr('opacity', n => matchIds.has(n.id) ? 1 : 0.05);
    linkElements.attr('stroke-opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return (matchIds.has(sid) && matchIds.has(tid)) ? 0.6 : 0.03;
    });

    // Show results in detail panel
    const detail = document.getElementById('detail');
    const content = document.getElementById('detail-content');
    const prettyKey = key.replace(/([A-Z])/g, ' $1').toLowerCase();
    let html = `<div class="detail-header">
      <div class="node-type-badge" style="background:var(--accent-dim); color:var(--accent)">filter</div>
      <div class="node-name">${val}</div>
      <div class="node-sub">${matching.length} nodes with ${prettyKey} = ${val}</div>
    </div>`;
    html += `<div class="detail-section"><div class="detail-section-title">Matching Nodes (${matching.length})</div>`;
    for (const n of matching) {
      const color = effectiveNodeColors[n.type] || '#666';
      html += `<div class="detail-edge" data-node-id="${n.id}">
        <span class="edge-dir" style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></span>
        <span class="edge-target">${getNodeLabel(n)}</span>
        <span class="edge-type">${n.type}</span>
      </div>`;
    }
    html += '</div>';
    content.innerHTML = html;
    detail.classList.add('open');

    // Click handlers for result nodes
    content.querySelectorAll('[data-node-id]').forEach(el => {
      el.addEventListener('click', () => {
        selectionHistory.push({ type: 'facet', key, val });
        const targetNode = nodes.find(n => n.id === el.dataset.nodeId);
        if (targetNode) selectNode(targetNode, undefined, true);
      });
    });
    updateBackBtn();
  }

  // ── Detail panel ──
  function showDetail(d, connectedEdges) {
    const detail = document.getElementById('detail');
    const content = document.getElementById('detail-content');
    const color = effectiveNodeColors[d.type] || '#666';

    // Determine which property was used as the label to skip it in properties
    const label = getNodeLabel(d);
    const labelKey = Object.keys(d.properties).find(k => String(d.properties[k]) === label);

    let html = `<div class="detail-header">
      <div class="node-type-badge" style="background:${color}22; color:${color}">${d.type.replace(/_/g, ' ')}</div>
      <div class="node-name">${label}</div>
      <div class="node-sub">${getNodeSub(d)}</div>
      <div class="depth-control">
        <span class="depth-label">Depth</span>
        <button class="depth-btn ${currentDepth === 1 ? 'active' : ''}" data-depth="1">1</button>
        <button class="depth-btn ${currentDepth === 2 ? 'active' : ''}" data-depth="2">2</button>
        <button class="depth-btn ${currentDepth === 3 ? 'active' : ''}" data-depth="3">3</button>
      </div>
    </div>`;

    // Auto-detect long text fields (>80 chars) and show as bio-style
    for (const [key, val] of Object.entries(d.properties)) {
      if (typeof val === 'string' && val.length > 80) {
        html += `<div class="detail-section"><div class="detail-bio">${val}</div></div>`;
      }
    }

    // Properties — skip the label key and any long text already shown
    const skipKeys = new Set([labelKey, 'email'].filter(Boolean));
    const propEntries = Object.entries(d.properties).filter(
      ([k, v]) => !skipKeys.has(k) && !(typeof v === 'string' && v.length > 80)
    );
    if (propEntries.length) {
      html += `<div class="detail-section"><div class="detail-section-title">Properties</div>`;
      for (const [key, val] of propEntries) {
        const strVal = String(val);
        // Check if the value matches a node label — navigate to it
        const matchNode = nodes.find(n => n.id !== d.id && getNodeLabel(n) === strVal);
        let valHtml;
        if (matchNode) {
          valHtml = `<span class="val val-link" data-node-id="${matchNode.id}">${val}</span>`;
        } else {
          // Make it a facet filter link — click to find all nodes with this key=value
          valHtml = `<span class="val val-filter" data-filter-key="${key}" data-filter-val="${strVal.replace(/"/g, '&quot;')}">${val}</span>`;
        }
        html += `<div class="detail-prop"><span class="key">${key.replace(/([A-Z])/g, ' $1').toLowerCase()}</span>${valHtml}</div>`;
      }
      html += '</div>';
    }

    // Grouped connections
    if (connectedEdges.length) {
      // Group by edge type
      const groups = {};
      for (const e of connectedEdges) {
        if (!groups[e.type]) groups[e.type] = [];
        groups[e.type].push(e);
      }
      // Sort by count descending
      const sortedGroups = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);

      html += `<div class="detail-section"><div class="detail-section-title">Connections (${connectedEdges.length})</div>`;
      for (const [edgeType, edges] of sortedGroups) {
        const style = getEdgeStyle(edgeType);
        html += `<div class="edge-group">
          <div class="edge-group-header" data-group="${edgeType}">
            <span class="group-arrow">▾</span>
            <span class="group-swatch" style="background:${style.color}"></span>
            <span class="group-type">${edgeType.replace(/_/g, ' ')}</span>
            <span class="group-count">${edges.length}</span>
          </div>
          <div class="edge-group-items" data-group="${edgeType}">`;
        for (const e of edges) {
          const isSource = (e.source.id || e.source) === d.id;
          const otherId = isSource ? (e.target.id || e.target) : (e.source.id || e.source);
          const other = nodeMap.get(otherId);
          if (!other) continue;
          const dir = isSource ? '→' : '←';
          html += `<div class="detail-edge" data-node-id="${otherId}">
            <span class="edge-dir">${dir}</span>
            <span class="edge-target">${getNodeLabel(other)}</span>
          </div>`;
        }
        html += '</div></div>';
      }
      html += '</div>';
    }

    content.innerHTML = html;
    detail.classList.add('open');

    // Depth button handlers
    content.querySelectorAll('.depth-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const newDepth = parseInt(btn.dataset.depth);
        selectNode(d, newDepth);
      });
    });

    // Group collapse/expand handlers
    content.querySelectorAll('.edge-group-header').forEach(header => {
      header.addEventListener('click', () => {
        const group = header.dataset.group;
        const items = content.querySelector(`.edge-group-items[data-group="${group}"]`);
        const arrow = header.querySelector('.group-arrow');
        items.classList.toggle('collapsed');
        arrow.classList.toggle('collapsed');
      });
    });

    // Click on connected nodes and linked property values
    content.querySelectorAll('[data-node-id]').forEach(el => {
      el.addEventListener('click', () => {
        const targetId = el.dataset.nodeId;
        const targetNode = nodes.find(n => n.id === targetId);
        if (targetNode) selectNode(targetNode);
      });
    });

    // Click on facet filter values (non-node property values)
    content.querySelectorAll('.val-filter').forEach(el => {
      el.addEventListener('click', () => {
        showFacet(el.dataset.filterKey, el.dataset.filterVal);
      });
    });
  }

  document.getElementById('detail-close').addEventListener('click', clearSelection);
  const backBtn = document.getElementById('detail-back');
  backBtn.addEventListener('click', goBack);

  function updateBackBtn() {
    backBtn.classList.toggle('enabled', selectionHistory.length > 0);
  }

  // ── Visibility update ──
  function updateVisibility() {
    const personFilter = getFilterbarMatchedPersons();

    nodeElements.attr('display', d => {
      if (!activeNodeTypes.has(d.type)) return 'none';
      // Person-level filters only apply to person nodes (and team node if team filtered)
      if (personFilter && d.type === 'person' && !personFilter.has(d.id)) return 'none';
      if (personFilter && d.type === 'team' && activeFilters.team && !personFilter.has(d.id)) return 'none';
      return null;
    });
    linkElements.attr('display', d => {
      const sNode = nodeMap.get(d.source.id || d.source);
      const tNode = nodeMap.get(d.target.id || d.target);
      if (!sNode || !tNode) return 'none';
      if (!activeNodeTypes.has(sNode.type) || !activeNodeTypes.has(tNode.type)) return 'none';
      if (!activeEdgeTypes.has(d.type)) return 'none';
      // If person filter active, hide edges where the person end isn't matched
      if (personFilter) {
        const sIsPerson = sNode.type === 'person';
        const tIsPerson = tNode.type === 'person';
        if (sIsPerson && !personFilter.has(sNode.id)) return 'none';
        if (tIsPerson && !personFilter.has(tNode.id)) return 'none';
      }
      return null;
    });
  }

  // ── Search ──
  const searchInput = document.getElementById('search');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) { searchResults.classList.remove('visible'); return; }

    const matches = nodes
      .filter(n => getNodeLabel(n).toLowerCase().includes(q) || n.type.includes(q))
      .slice(0, 15);

    if (!matches.length) { searchResults.classList.remove('visible'); return; }

    searchResults.innerHTML = matches.map(n => `
      <div class="search-item" data-id="${n.id}">
        <span class="type-dot" style="background:${effectiveNodeColors[n.type] || '#666'}"></span>
        <span class="name">${getNodeLabel(n)}</span>
        <span class="meta">${n.type}</span>
      </div>
    `).join('');
    searchResults.classList.add('visible');

    searchResults.querySelectorAll('.search-item').forEach(el => {
      el.addEventListener('click', () => {
        const node = nodes.find(n => n.id === el.dataset.id);
        if (node) {
          selectNode(node);
          // Pan to node
          const svgEl = document.getElementById('graph-svg');
          const w = svgEl.clientWidth;
          const h = svgEl.clientHeight;
          svg.transition().duration(600).call(
            zoom.transform,
            d3.zoomIdentity.translate(w/2 - node.x * 1.5, h/2 - node.y * 1.5).scale(1.5)
          );
        }
        searchInput.value = '';
        searchResults.classList.remove('visible');
      });
    });
  });

  searchInput.addEventListener('blur', () => {
    setTimeout(() => searchResults.classList.remove('visible'), 200);
  });

  // ── Fit button ──
  document.getElementById('fit-btn').addEventListener('click', fitGraph);

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    // Don't intercept when typing in search
    if (e.target === searchInput) return;
    if (e.key === 'Escape') clearSelection();
    if (e.key === 'Backspace') goBack();
    if (e.key === 'f' || e.key === 'F') fitGraph();
  });

  // ── Initialize label visibility at current zoom ──
  updateLabelVisibility(1);

  // ── Done loading ──
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 600);

})();
</script>
</body>
</html>
